name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Send Telegram notification on success
        if: success()
        env:
          MSG: "✅ <b>Сборка Wallos завершена успешно!</b>%0A%0AРепозиторий: ${{ github.repository }}%0AВетка: ${{ github.ref_name }}%0AКоммит: ${{ github.sha[:7] }}%0A%0A🔗 Образ: ghcr.io/${{ github.repository }}:latest%0A%0AОбнови контейнер в Coolify!"
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "message_thread_id=1"             -d "text=${MSG}"             -d "parse_mode=HTML"

      - name: Send Telegram notification on failure
        if: failure()
        env:
          MSG: "❌ <b>Сборка Wallos упала!</b>%0A%0AРепозиторий: ${{ github.repository }}%0AВетка: ${{ github.ref_name }}%0AКоммит: ${{ github.sha[:7] }}%0A%0AПроверь логи: https://github.com/${{ github.repository }}/actions"
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "message_thread_id=1"             -d "text=${MSG}"             -d "parse_mode=HTML"
